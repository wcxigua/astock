name: A股定时选股

on:
  push:
    branches: [main]
  schedule:
    - cron: '25 1 * * 1-5'     # 09:25 CST 早盘推送
    - cron: '*/15 2-3 * * 1-5'  # 10:00-11:45 CST 上午时段
    - cron: '*/15 5-6 * * 1-5'  # 13:00-14:45 CST 下午时段
    - cron: '10 7 * * 1-5'     # 15:10 CST 收盘推送
  workflow_dispatch:            # 支持手动触发

jobs:
  select-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - run: pip install -r requirements.txt

      - name: 运行选股 + 生成报告 + 钉钉推送
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          SEND_KEY: ${{ secrets.SEND_KEY }}
        run: python scripts/generate_report.py

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: select-and-push
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
